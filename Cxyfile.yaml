package:
  name: cxyml
  version: 0.1.3
  author: Carter Mbotho<lastcarter@gmail.com>
  description: Compile-time server-side rendering (SSR) library for Cxy — write HTML components in XML-like markup, compiled to direct stream writes with zero runtime parsing
  license: MIT

builds:
  cxyml-plugin:
    entry: src/plugin/index.c
    output: cxyml

dependencies: []

tests:
  - file: "src/**/*.cxy"

scripts:
  build-tests:
    inputs:
      - src/plugin/lexer.c
      - src/plugin/parser.c
      - src/plugin/codegen.c
      - "tests/**/test_harness.h"
      - "tests/**/*.c"
    outputs:
      - "{{BUILD_DIR}}/cxyml-tests"
    command: |
      SOURCES="{{SOURCE_DIR}}/src/plugin/lexer.c {{SOURCE_DIR}}/src/plugin/parser.c \
        {{SOURCE_DIR}}/src/plugin/codegen.c"
      CFLAGS="-I $CXY_ROOT/include -L $CXY_ROOT/lib -l cxy-plugin"
      if [ $(uname) = "Darwin" ]; then
        CFLAGS="$CFLAGS -D_DARWIN_C_SOURCE"
      fi
      cc $CFLAGS -o {{SCRIPT_OUTPUTS}} ${SOURCES} {{SOURCE_DIR}}/tests/plugin/main.c

  run-tests:
    depends: [build-tests]
    command: "{{BUILD_DIR}}/cxyml-tests"
  build-plugin:
    inputs:
      - "src/**/*.c"
    outputs:
      - "{{BUILD_DIR}}/cxyml-plugin"
    command: |
      cxy build --plugin {{SOURCE_DIR}}/src/plugin/index.c \
        --build-dir {{BUILD_DIR}} -o cxyml

install:
  - name: cxyml
    plugin:
      entry: src/plugin/index.c
      inputs:
        - "src/plugin/**/*.c"
        - "src/plugin/**/*.h"
    required: true
